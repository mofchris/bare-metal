<!doctype html>
<!-- Icon source for the PWA. Regenerate the PNGs in public/icons/ by
     rendering this file in a browser and screenshotting each tile at its
     natural size (the build does NOT do this automatically — icons change
     rarely and the PNGs are committed). Glyph sits inside the central 80%
     so the 512 tile is safe for iOS/Android maskable cropping. -->
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      .tile {
        background: #1a1a2e;
        color: #4cc9a4;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
      }
      .icon-512 {
        width: 512px;
        height: 512px;
        font-size: 300px;
      }
      .icon-192 {
        width: 192px;
        height: 192px;
        font-size: 112px;
      }
      .icon-180 {
        width: 180px;
        height: 180px;
        font-size: 105px;
      }
    </style>
  </head>
  <body>
    <div class="tile icon-512">M</div>
    <div class="tile icon-192">M</div>
    <div class="tile icon-180">M</div>
  </body>
</html>
